<!DOCTYPE html>
<html>
<head>
  <title>Air Quality Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ===== CONFIG =====
const channelID = "3353585";

// ===== MAP =====
var map = L.map('map').setView([41.85, 12.62], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// ===== FETCH DATA =====
fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=100`)
  .then(res => res.json())
  .then(data => {

    data.feeds.forEach(point => {

      let lat = parseFloat(point.field5);
      let lon = parseFloat(point.field6);
      let pm25 = parseFloat(point.field2);

      if (!isNaN(lat) && !isNaN(lon)) {

        let color = "green";

        if (pm25 > 25) color = "red";
        else if (pm25 > 10) color = "orange";

        L.circleMarker([lat, lon], {
          radius: 6,
          color: color
        }).addTo(map)
        .bindPopup(`PM2.5: ${pm25}`);
      }
    });

  });

</script>

</body>
</html>
